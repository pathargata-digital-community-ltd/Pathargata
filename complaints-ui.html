<button onclick="switchPage('services')" class="mb-4 text-gray-500 font-bold text-sm"><i class="fa-solid fa-arrow-left"></i> ফিরে যান</button>
<h2 class="text-xl font-bold mb-5 border-l-4 border-red-500 pl-3 text-gray-700">স্মার্ট অভিযোগ বক্স</h2>
<div class="bg-white p-4 rounded-xl shadow-sm mb-6">
    <h3 class="font-bold text-gray-800 mb-3 text-base">নতুন অভিযোগ করুন</h3>
    <div class="space-y-3">
        <div>
            <label class="block text-xs font-bold text-gray-500 mb-1">কাকে জানাবেন?</label>
            <select id="complaint-to" class="w-full bg-gray-50 border p-3 rounded-lg text-sm">
                <option value="UNO">উপজেলা নির্বাহী কর্মকর্তা (UNO)</option>
                <option value="OC">থানা পুলিশ (OC)</option>
                <option value="Chairman">উপজেলা চেয়ারম্যান</option>
                <option value="ViceChairman">ভাইস চেয়ারম্যান</option>
                <option value="General">সাধারণ অভিযোগ</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-bold text-gray-500 mb-1">বিষয়</label>
            <select id="complaint-type" class="w-full bg-gray-50 border p-3 rounded-lg text-sm">
                <option value="Road">রাস্তাঘাট সংস্কার</option>
                <option value="Water">পানি ও পয়নিষ্কাশন</option>
                <option value="Dispute">পারিবারিক/জমি বিরোধ</option>
                <option value="Corruption">অনিয়ম ও দুর্নীতি</option>
                <option value="Other">অন্যান্য</option>
            </select>
        </div>
        <textarea id="complaint-text" rows="3" placeholder="বিস্তারিত লিখুন..." class="w-full bg-gray-50 border p-3 rounded-lg text-sm"></textarea>
        
        <!-- সংযুক্তি ও জিপিএস সেকশন -->
        <div class="grid grid-cols-2 gap-2">
            <div>
                <label class="block text-[11px] font-bold text-gray-500 mb-1">প্রমাণ স্বরূপ ছবি (ঐচ্ছিক)</label>
                <input type="file" id="complaint-file" accept="image/*" class="w-full bg-gray-50 border p-2 rounded-lg text-xs">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-gray-500 mb-1">লোকেশন ট্যাগ (ঐচ্ছিক)</label>
                <button onclick="window.getComplaintLocation(this)" type="button" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 px-3 rounded-lg text-xs flex items-center justify-center gap-1 transition">
                    <i class="fa-solid fa-location-crosshairs text-red-500"></i> <span id="location-status-text">লোকেশন দিন</span>
                </button>
                <input type="hidden" id="complaint-lat">
                <input type="hidden" id="complaint-lng">
            </div>
        </div>

        <div class="flex items-center gap-2">
            <input type="checkbox" id="complaint-anon" class="w-5 h-5 text-green-600 rounded">
            <label for="complaint-anon" class="text-sm text-gray-600 font-medium">নাম গোপন রাখুন (Anonymous)</label>
        </div>
        <button onclick="submitComplaint()" id="btn-complaint-submit" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg shadow hover:bg-red-700 text-base mt-2">জমা দিন</button>
    </div>
</div>
<div>
    <h3 class="font-bold text-gray-700 mb-3 text-sm">আমার অভিযোগসমূহ</h3>
    <div id="my-complaints-list" class="space-y-3">
        <p class="text-center text-gray-400 text-xs py-4">কোনো অভিযোগ নেই</p>
    </div>
</div>
