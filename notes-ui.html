<style>
    /* Professional Custom Floating Reaction Animation */
    @keyframes floatReaction {
        0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
        20% { transform: translate(-15px, -40px) scale(1.3) rotate(-10deg); opacity: 1; }
        50% { transform: translate(15px, -100px) scale(1.1) rotate(10deg); opacity: 0.9; }
        80% { transform: translate(-10px, -180px) scale(1.2) rotate(-5deg); opacity: 0.6; }
        100% { transform: translate(10px, -250px) scale(1.5) rotate(0deg); opacity: 0; }
    }
    
    .reaction-bubble {
        position: absolute;
        animation: floatReaction 1.8s ease-out forwards;
        pointer-events: none;
        z-index: 9999;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
    }
    
    /* Hide scrollbar */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>

<div id="temp-notes-feed">
    <!-- স্টোরি সেকশন (Facebook Style) -->
    <div class="bg-white pt-3 pb-4 mb-2 shadow-sm border-b">
        <div class="px-4 flex justify-between items-center mb-3">
            <h3 class="font-bold text-gray-800 text-sm">স্টোরি</h3>
        </div>
        <div id="notes-list-container" class="flex gap-2 px-4 overflow-x-auto pb-2 no-scrollbar">
            <p class="text-xs text-gray-400">স্টোরি লোড হচ্ছে...</p>
        </div>
    </div>
</div>

<div id="temp-notes-modal">
    <!-- Add Story Modal -->
    <div id="note-modal" class="fixed inset-0 bg-black bg-opacity-70 z-[200] flex items-center justify-center hidden-custom p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-2xl p-5 shadow-2xl relative transform transition-all">
            <button onclick="toggleNoteModal(false)" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200 transition">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="font-bold text-lg text-gray-800 mb-1">স্টোরি দিন</h3>
            <p class="text-[11px] text-gray-500 mb-4">ছবি, ভিডিও বা টেক্সট দিন। ২৪ ঘণ্টা পর মুছে যাবে।</p>
            
            <div class="relative w-full mb-3">
                <textarea id="note-input-text" maxlength="80" rows="3" placeholder="ক্যাপশন বা টেক্সট লিখুন..." class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl text-lg focus:outline-none resize-none font-bold text-center transition-colors"></textarea>
                <button onclick="changeStoryBackground()" class="absolute bottom-2 right-2 w-8 h-8 rounded-full bg-white/80 shadow flex items-center justify-center text-gray-700 hover:bg-gray-200" title="Change Background">
                    <i class="fa-solid fa-palette text-sm"></i>
                </button>
            </div>
            
            <div class="mb-4">
                <label class="block text-xs font-bold text-gray-600 mb-2">অথবা ছবি/ভিডিও দিন (সর্বোচ্চ ১০MB)</label>
                <input type="file" id="story-file-input" accept="image/*,video/mp4" class="w-full border border-gray-200 rounded-lg p-2 text-sm bg-gray-50 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:bg-blue-50 file:text-blue-700">
            </div>
            
            <button onclick="submitStory()" id="btn-note-submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow hover:bg-blue-700 transition flex justify-center items-center gap-2">
                <i class="fa-solid fa-paper-plane"></i> স্টোরি শেয়ার করুন
            </button>
        </div>
    </div>

    <!-- Fullscreen Story Viewer -->
    <div id="story-viewer-modal" class="fixed inset-0 bg-black z-[300] hidden-custom flex flex-col">
        <!-- Progress Bar -->
        <div id="story-progress-container" class="absolute top-2 left-2 right-2 flex gap-1 z-50 h-1"></div>
        
        <!-- Header -->
        <div class="absolute top-6 left-4 right-4 z-50 flex justify-between items-center mt-2">
            <div class="flex items-center gap-2">
                <div id="story-viewer-avatar" class="w-10 h-10 rounded-full bg-gray-300 border border-white overflow-hidden shadow-md"></div>
                <div>
                    <h4 id="story-viewer-name" class="text-white font-bold text-sm shadow-black drop-shadow-md">Name</h4>
                    <p id="story-viewer-time" class="text-white text-[10px] opacity-80 shadow-black drop-shadow-md">Time</p>
                </div>
            </div>
            <div class="flex items-center gap-3" id="header-actions">
                <button onclick="closeStoryViewer()" class="w-8 h-8 text-white rounded-full flex items-center justify-center bg-black/50 hover:bg-black/80 backdrop-blur-md">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
        </div>

        <!-- Media Container (Tap & Swipe handled by JS) -->
        <div class="flex-1 relative flex items-center justify-center overflow-hidden bg-black mt-14 mb-20" id="story-media-container">
            <!-- Image or Video will be injected here -->
        </div>
        
        <!-- Reactions Display (Who reacted what) -->
        <div id="story-reactions-display" class="absolute bottom-20 left-4 z-40 flex items-center gap-2 text-white text-sm shadow-black drop-shadow-md pointer-events-none">
            <!-- Reactions will be loaded here -->
        </div>

        <!-- Caption Area -->
        <div class="absolute bottom-20 left-0 right-0 px-4 bg-gradient-to-t from-black via-black/50 to-transparent z-30 pb-4 text-center pointer-events-none">
            <p id="story-viewer-caption" class="text-white text-sm font-medium shadow-black drop-shadow-md whitespace-pre-line"></p>
        </div>

        <!-- Dynamic Footer (Reactions/Reply OR Views) -->
        <div id="story-footer-container" class="absolute bottom-4 left-0 right-0 z-50 px-4">
            <!-- JS will inject dynamic footer here -->
        </div>
    </div>
</div>
