<!-- চ্যাট লিস্ট ভিউ -->
<div id="chat-list-view" class="h-full flex flex-col bg-white relative">
    <!-- Header with Group Button -->
    <div class="p-4 border-b flex justify-between items-center shadow-sm z-10 bg-white relative">
        <h2 class="text-xl font-bold text-gray-800">মেসেজ</h2>
        <button onclick="openGroupCreateModal()" class="bg-green-100 text-green-700 px-3 py-1.5 rounded-full text-sm font-bold hover:bg-green-200 transition">
            <i class="fa-solid fa-users mr-1"></i> নতুন গ্রুপ
        </button>
    </div>

    <!-- Search Bar -->
    <div class="px-4 py-2 border-b bg-gray-50 sticky top-0 z-10">
        <div class="relative">
            <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400 text-sm"></i>
            <input type="text" id="chat-search-input" onkeyup="searchChats()" placeholder="বন্ধু বা মেসেজ খুঁজুন..." class="w-full bg-white rounded-full pl-9 pr-4 py-2 text-sm border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>
    </div>
    
    <!-- Active Friends -->
    <div class="px-4 py-3 border-b bg-white overflow-x-auto whitespace-nowrap">
        <h4 class="text-[11px] font-bold text-gray-400 mb-2 uppercase tracking-wide">Active Friends</h4>
        <div id="quick-chat-friends" class="flex gap-4">
            <p class="text-xs text-gray-400">লোড হচ্ছে...</p>
        </div>
    </div>
    
    <!-- Chat List -->
    <div id="chat-list-container" class="flex-1 overflow-y-auto space-y-0 pb-20 bg-white">
        <div class="flex justify-center p-10"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-600"></div></div>
    </div>
</div>

<!-- চ্যাট কনভারসেশন ভিউ -->
<div id="chat-conversation-view" class="hidden fixed inset-0 z-[200] bg-white flex flex-col">
    <!-- Header -->
    <div class="bg-white p-2 border-b flex items-center justify-between sticky top-0 z-20 shadow-sm pt-safe">
        <div class="flex items-center gap-1">
            <button onclick="closeChat()" class="text-gray-500 w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 shrink-0"><i class="fa-solid fa-arrow-left text-lg"></i></button>
            
            <div class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 p-1.5 rounded-lg transition" onclick="if(!isCurrentChatGroup) openUserProfile(currentChatUser.uid)">
                <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-700 font-bold border border-green-200 overflow-hidden relative shrink-0" id="chat-header-img">U</div>
                <div class="min-w-0">
                    <h3 class="font-bold text-gray-800 text-base leading-tight truncate" id="chat-header-name">User</h3>
                    <p id="chat-header-status" class="text-[11px] text-gray-500 font-medium truncate">Checking...</p>
                </div>
            </div>
        </div>
        <button onclick="deleteEntireConversation()" class="w-10 h-10 rounded-full hover:bg-red-50 text-red-500 flex items-center justify-center transition shrink-0" title="Delete Chat">
            <i class="fa-solid fa-trash-can"></i>
        </button>
    </div>

    <!-- Messages Area -->
    <div id="messages-container" class="flex-1 overflow-x-hidden overflow-y-auto p-4 space-y-4 bg-[#f0f2f5] pb-32"></div>
    
    <!-- Chat Input Area -->
    <div class="bg-white border-t fixed bottom-0 w-full pb-safe z-50 flex flex-col shadow-[0_-5px_10px_rgba(0,0,0,0.02)]">
        
        <!-- Reply Preview Box -->
        <div id="reply-preview-box" class="hidden bg-gray-50 border-l-4 border-green-500 p-2 flex justify-between items-center px-4">
            <div class="flex-1 min-w-0">
                <span id="reply-preview-name" class="font-bold text-green-600 text-xs">Name</span>
                <p id="reply-preview-text" class="text-gray-500 text-[11px] truncate mt-0.5">Message...</p>
            </div>
            <button onclick="cancelReply()" class="text-gray-400 hover:text-red-500 p-2"><i class="fa-solid fa-times"></i></button>
        </div>

        <div class="p-2 flex flex-col gap-2 relative">
            <!-- Voice Recording UI -->
            <div id="chat-voice-recording-ui" class="hidden flex items-center justify-between bg-red-50 p-2 rounded-lg border border-red-100">
                <div class="flex items-center gap-2 text-red-600">
                    <div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                    <span class="text-sm font-bold" id="chat-record-timer">00:00</span>
                </div>
                <div class="flex gap-3">
                    <button onclick="cancelChatRecording()" class="text-gray-500 hover:text-red-500"><i class="fa-solid fa-trash text-lg"></i></button>
                    <button onclick="stopAndSendChatRecording()" class="bg-green-500 text-white w-8 h-8 rounded-full flex items-center justify-center shadow"><i class="fa-solid fa-paper-plane text-xs"></i></button>
                </div>
            </div>

            <!-- Default Input UI -->
            <div id="chat-default-input-ui" class="flex gap-1.5 items-center bg-gray-100 rounded-full px-2 py-1">
                <input type="file" id="chat-img-input" accept="image/*" class="hidden" onchange="handleChatImageSelect()">
                <button onclick="document.getElementById('chat-img-input').click()" class="text-blue-500 text-lg p-2 hover:bg-blue-100 rounded-full w-9 h-9 flex items-center justify-center shrink-0 transition"><i class="fa-solid fa-camera"></i></button>
                
                <input type="text" id="msg-input" onkeydown="handleEnter(event, 'chat')" placeholder="মেসেজ লিখুন..." class="flex-1 bg-transparent px-2 py-2 text-[15px] border-0 focus:ring-0 text-gray-800 placeholder-gray-500">
                
                <button onclick="startChatRecording()" class="text-gray-500 hover:text-red-500 text-lg p-2 rounded-full w-9 h-9 flex items-center justify-center shrink-0 transition"><i class="fa-solid fa-microphone"></i></button>
                <button onclick="sendMsg()" id="btn-chat-send" class="bg-green-500 text-white text-sm p-2 rounded-full w-9 h-9 flex items-center justify-center shrink-0 transition shadow-md hover:bg-green-600"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- Full Screen Photo Viewer -->
<div id="photo-viewer-modal" class="hidden fixed inset-0 z-[300] bg-black/95 flex items-center justify-center backdrop-blur-sm transition-opacity">
    <button onclick="closePhotoViewer()" class="absolute top-4 right-4 text-white p-3 hover:bg-white/10 rounded-full z-50"><i class="fa-solid fa-xmark text-2xl"></i></button>
    <img id="photo-viewer-img" src="" class="max-w-full max-h-full object-contain select-none transition-transform scale-95" alt="Photo">
</div>

<!-- Group Creation Modal -->
<div id="group-create-modal" class="hidden fixed inset-0 z-[300] bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md flex flex-col max-h-[80vh]">
        <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
            <h3 class="font-bold text-lg text-gray-800">নতুন গ্রুপ তৈরি করুন</h3>
            <button onclick="closeGroupModal()" class="text-gray-500 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div class="p-4 border-b">
            <input type="text" id="group-name-input" placeholder="গ্রুপের নাম লিখুন..." class="w-full bg-gray-100 rounded-lg px-4 py-2.5 border-0 focus:ring-2 focus:ring-green-500 font-bold">
        </div>
        <div class="p-2 bg-gray-100 text-xs text-gray-500 font-bold text-center">সদস্য নির্বাচন করুন</div>
        <div id="group-friends-list" class="flex-1 overflow-y-auto p-2 space-y-1 min-h-[200px]">
            <!-- Friends will load here -->
        </div>
        <div class="p-4 border-t bg-gray-50 rounded-b-xl">
            <button onclick="createGroup()" class="w-full bg-green-600 text-white font-bold py-2.5 rounded-lg hover:bg-green-700 transition shadow">গ্রুপ তৈরি করুন</button>
        </div>
    </div>
</div>
