<!-- Chat List View (Recent Chats) -->
<div id="chat-list-view" class="h-full">
    <div class="p-4 border-b">
        <h2 class="text-xl font-bold text-gray-800">মেসেজ</h2>
    </div>
    <div class="px-4 py-3 border-b bg-gray-50 overflow-x-auto whitespace-nowrap">
        <h4 class="text-xs font-bold text-gray-500 mb-2">Active Friends</h4>
        <div id="quick-chat-friends" class="flex gap-4">
            <p class="text-xs text-gray-400">লোড হচ্ছে...</p>
        </div>
    </div>
    <div id="chat-list-container" class="space-y-0">
        <p class="text-center text-gray-400 mt-10 text-sm">লোড হচ্ছে...</p>
    </div>
</div>

<!-- Chat Conversation View (Inside Message) -->
<div id="chat-conversation-view" class="hidden hidden-custom fixed inset-0 z-[200] bg-white flex flex-col">
    
    <!-- Chat Header -->
    <div class="bg-white p-3 border-b flex items-center gap-3 sticky top-0 z-20 shadow-sm pt-safe">
        <button onclick="closeChat()" class="text-gray-500 w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100"><i class="fa-solid fa-arrow-left text-lg"></i></button>
        <!-- Profile Picture (Clickable to view profile) -->
        <div onclick="openUserProfile(currentChatUser.uid)" class="cursor-pointer w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-700 font-bold border border-green-200 overflow-hidden" id="chat-header-img">U</div>
        <h3 onclick="openUserProfile(currentChatUser.uid)" class="font-bold text-gray-800 cursor-pointer text-lg flex-1" id="chat-header-name">User</h3>
    </div>

    <!-- Messages Container -->
    <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-[#f0f2f5] pb-32"></div>

    <!-- Bottom Input Area with Reply Box & Voice Mic -->
    <div class="bg-white flex flex-col border-t fixed bottom-0 w-full pb-safe z-50">
        
        <!-- Reply Context View (Hidden by default, shows when you swipe right) -->
        <div id="reply-context-view" class="hidden px-4 py-2 bg-gray-100 border-b flex justify-between items-center text-sm">
            <div class="flex-1 truncate border-l-4 border-green-500 pl-2">
                <p class="font-bold text-gray-700 text-xs" id="reply-to-name">Replying...</p>
                <p class="text-gray-500 text-xs truncate" id="reply-to-msg"></p>
            </div>
            <button onclick="cancelReply()" class="text-gray-500 hover:text-red-500 ml-2"><i class="fa-solid fa-times"></i></button>
        </div>

        <!-- Input Tools (Image, Text, Mic, Send) -->
        <div class="p-3 flex gap-2 items-center">
            <input type="file" id="chat-img-input" accept="image/*" class="hidden" onchange="handleChatImageSelect()">
            <i class="fa-solid fa-image text-xl text-gray-500 p-2 cursor-pointer hover:bg-gray-100 rounded-full" onclick="document.getElementById('chat-img-input').click()"></i>
            
            <input type="text" id="msg-input" onkeydown="handleEnter(event, 'chat')" placeholder="মেসেজ লিখুন..." class="flex-1 bg-gray-100 rounded-full px-5 py-3 text-sm border-0 focus:ring-1 focus:ring-green-500">
            
            <!-- Voice Record Button (Press and hold to talk) -->
            <button id="btn-voice-record" onmousedown="startVoiceRecord()" onmouseup="stopVoiceRecord()" ontouchstart="startVoiceRecord()" ontouchend="stopVoiceRecord()" class="text-gray-500 text-xl p-2 hover:bg-gray-100 rounded-full w-12 h-12 flex items-center justify-center transition-colors">
                <i class="fa-solid fa-microphone"></i>
            </button>

            <button onclick="sendMsg()" id="btn-chat-send" class="text-green-600 text-xl p-2 hover:bg-gray-100 rounded-full w-12 h-12 flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<!-- Message Options Modal (Shows when you long-press a message) -->
<div id="msg-options-modal" class="hidden fixed inset-0 z-[300] bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white w-3/4 max-w-sm rounded-xl p-4 shadow-lg">
        <h3 class="text-lg font-bold mb-4 text-center border-b pb-2">মেসেজ অপশন</h3>
        
        <button onclick="forwardMessage()" class="w-full text-left p-3 hover:bg-gray-100 rounded-lg flex items-center gap-3"><i class="fa-solid fa-share"></i> Forward</button>
        
        <button id="btn-unsend" onclick="unsendMessage()" class="w-full text-left p-3 hover:bg-gray-100 rounded-lg text-red-600 flex items-center gap-3"><i class="fa-solid fa-trash-can"></i> Unsend (Everyone)</button>
        
        <button onclick="removeMessageForMe()" class="w-full text-left p-3 hover:bg-gray-100 rounded-lg flex items-center gap-3"><i class="fa-solid fa-eye-slash"></i> Remove (For Me)</button>
        
        <button onclick="closeMsgOptions()" class="w-full text-center p-3 mt-2 bg-gray-200 rounded-lg font-bold">Cancel</button>
    </div>
</div>

<!-- Forward Friends List Modal -->
<div id="forward-modal" class="hidden fixed inset-0 z-[350] bg-black bg-opacity-50 flex items-end sm:items-center justify-center">
    <div class="bg-white w-full sm:w-96 rounded-t-xl sm:rounded-xl h-[60vh] flex flex-col">
        <div class="p-4 border-b flex justify-between items-center">
            <h3 class="text-lg font-bold">কাকে পাঠাবেন?</h3>
            <button onclick="closeForwardModal()" class="text-gray-500"><i class="fa-solid fa-times text-xl"></i></button>
        </div>
        <div id="forward-friends-list" class="flex-1 overflow-y-auto p-2">
            <p class="text-center text-gray-500 mt-5">লোড হচ্ছে...</p>
        </div>
    </div>
</div>
