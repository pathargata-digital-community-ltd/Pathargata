<!-- Chat List View (Recent Chats) -->
<div id="chat-list-view" class="h-full">
    <div class="p-4 border-b">
        <h2 class="text-xl font-bold text-gray-800">মেসেজ</h2>
    </div>
    <div class="px-4 py-3 border-b bg-gray-50 overflow-x-auto whitespace-nowrap">
        <h4 class="text-xs font-bold text-gray-500 mb-2">Active Friends</h4>
        <div id="quick-chat-friends" class="flex gap-4">
            <p class="text-xs text-gray-400">লোড হচ্ছে...</p>
        </div>
    </div>
    <div id="chat-list-container" class="space-y-0 pb-20">
        <p class="text-center text-gray-400 mt-10 text-sm">লোড হচ্ছে...</p>
    </div>
</div>

<!-- Chat Conversation View (Inside Message) -->
<div id="chat-conversation-view" class="hidden hidden-custom fixed inset-0 z-[200] bg-white flex flex-col">
    
    <!-- Chat Header -->
    <div class="bg-white p-3 border-b flex items-center gap-3 sticky top-0 z-20 shadow-sm pt-safe transition-all">
        <button onclick="closeChat()" class="text-gray-500 w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors"><i class="fa-solid fa-arrow-left text-lg"></i></button>
        <!-- Profile Picture -->
        <div onclick="openUserProfile(currentChatUser.uid)" class="cursor-pointer w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-700 font-bold border border-green-200 overflow-hidden shadow-sm" id="chat-header-img">U</div>
        <div class="flex-1 flex flex-col justify-center">
            <h3 onclick="openUserProfile(currentChatUser.uid)" class="font-bold text-gray-800 cursor-pointer text-lg leading-tight" id="chat-header-name">User</h3>
            <span id="chat-header-typing" class="text-[11px] text-green-500 font-medium italic hidden animate-pulse">Typing...</span>
        </div>
    </div>

    <!-- Messages Container -->
    <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-[#f0f2f5] pb-32 scroll-smooth"></div>

    <!-- Bottom Input Area with Reply Box & Voice Mic -->
    <div class="bg-white flex flex-col border-t fixed bottom-0 w-full pb-safe z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        
        <!-- Reply Context View -->
        <div id="reply-context-view" class="hidden px-4 py-2 bg-green-50/80 backdrop-blur-sm border-b flex justify-between items-center text-sm transition-all duration-300">
            <div class="flex-1 truncate border-l-4 border-green-500 pl-3">
                <p class="font-bold text-green-700 text-xs flex items-center gap-1"><i class="fa-solid fa-reply"></i> Replying to message</p>
                <p class="text-gray-600 text-xs truncate mt-0.5" id="reply-to-msg"></p>
            </div>
            <button onclick="cancelReply()" class="text-gray-400 hover:text-red-500 ml-2 p-1 rounded-full hover:bg-red-50 transition-colors"><i class="fa-solid fa-times text-lg"></i></button>
        </div>

        <!-- Input Tools -->
        <div class="p-3 flex gap-2 items-center">
            <input type="file" id="chat-img-input" accept="image/*" class="hidden" onchange="handleChatImageSelect()">
            <i class="fa-solid fa-image text-xl text-gray-500 p-2 cursor-pointer hover:bg-gray-100 hover:text-green-600 rounded-full transition-colors" onclick="document.getElementById('chat-img-input').click()"></i>
            
            <input type="text" id="msg-input" onkeydown="handleEnter(event, 'chat')" placeholder="মেসেজ লিখুন..." class="flex-1 bg-gray-100 rounded-full px-5 py-3 text-sm border-0 focus:ring-2 focus:ring-green-400 transition-shadow">
            
            <button id="btn-voice-record" onmousedown="startVoiceRecord()" onmouseup="stopVoiceRecord()" ontouchstart="startVoiceRecord()" ontouchend="stopVoiceRecord()" class="text-gray-500 text-xl p-2 hover:bg-gray-100 hover:text-green-600 rounded-full w-12 h-12 flex items-center justify-center transition-all">
                <i class="fa-solid fa-microphone"></i>
            </button>

            <button onclick="sendMsg()" id="btn-chat-send" class="text-white bg-green-500 text-lg hover:bg-green-600 rounded-full w-10 h-10 flex items-center justify-center shadow-md transition-transform active:scale-95"><i class="fa-solid fa-paper-plane mr-0.5"></i></button>
        </div>
    </div>
</div>

<!-- Message Options Modal (For inside chat) -->
<div id="msg-options-modal" class="hidden fixed inset-0 z-[300] bg-black bg-opacity-40 backdrop-blur-sm flex items-center justify-center transition-opacity">
    <div class="bg-white w-3/4 max-w-sm rounded-2xl p-5 shadow-2xl transform scale-100 transition-transform">
        <h3 class="text-base font-bold mb-3 text-center border-b pb-3 text-gray-700">মেসেজ অপশন</h3>
        <button onclick="forwardMessage()" class="w-full text-left p-3 hover:bg-gray-50 rounded-xl flex items-center gap-3 font-medium transition-colors"><i class="fa-solid fa-share text-blue-500"></i> Forward</button>
        <button id="btn-unsend" onclick="unsendMessage()" class="w-full text-left p-3 hover:bg-red-50 rounded-xl text-red-600 flex items-center gap-3 font-medium transition-colors"><i class="fa-solid fa-trash-can"></i> Unsend (Everyone)</button>
        <button onclick="removeMessageForMe()" class="w-full text-left p-3 hover:bg-gray-50 rounded-xl flex items-center gap-3 font-medium transition-colors"><i class="fa-solid fa-eye-slash text-gray-500"></i> Remove (For Me)</button>
        <button onclick="closeMsgOptions()" class="w-full text-center p-3 mt-3 bg-gray-100 hover:bg-gray-200 rounded-xl font-bold transition-colors">Cancel</button>
    </div>
</div>

<!-- Chat List Options Modal (Archive / Delete) -->
<div id="chat-list-options-modal" class="hidden fixed inset-0 z-[300] bg-black bg-opacity-40 backdrop-blur-sm flex items-center justify-center transition-opacity">
    <div class="bg-white w-3/4 max-w-sm rounded-2xl p-5 shadow-2xl">
        <h3 class="text-base font-bold mb-3 text-center border-b pb-3 text-gray-800" id="chat-list-name-display">Chat Options</h3>
        <button onclick="archiveChat()" class="w-full text-left p-3 hover:bg-gray-50 rounded-xl flex items-center gap-3 font-medium text-gray-700 transition-colors"><i class="fa-solid fa-box-archive text-blue-500"></i> Archive Chat</button>
        <button onclick="deleteChat()" class="w-full text-left p-3 hover:bg-red-50 rounded-xl text-red-600 flex items-center gap-3 font-medium transition-colors mt-1"><i class="fa-solid fa-trash-can"></i> Delete Conversation</button>
        <button onclick="closeChatListOptions()" class="w-full text-center p-3 mt-3 bg-gray-100 hover:bg-gray-200 rounded-xl font-bold transition-colors">Cancel</button>
    </div>
</div>

<!-- Forward Friends List Modal -->
<div id="forward-modal" class="hidden fixed inset-0 z-[350] bg-black bg-opacity-50 flex items-end sm:items-center justify-center">
    <div class="bg-white w-full sm:w-96 rounded-t-xl sm:rounded-xl h-[60vh] flex flex-col">
        <div class="p-4 border-b flex justify-between items-center">
            <h3 class="text-lg font-bold">কাকে পাঠাবেন?</h3>
            <button onclick="closeForwardModal()" class="text-gray-500"><i class="fa-solid fa-times text-xl"></i></button>
        </div>
        <div id="forward-friends-list" class="flex-1 overflow-y-auto p-2">
            <p class="text-center text-gray-500 mt-5">লোড হচ্ছে...</p>
        </div>
    </div>
</div>
