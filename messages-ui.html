<!-- Chat List View -->
<div id="chat-list-view" class="h-full bg-white flex flex-col">
    <div class="p-4 border-b pb-2">
        <h2 class="text-xl font-bold text-gray-800 mb-3">মেসেজ</h2>
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
            <input type="text" id="chat-friend-search" onkeyup="searchChatFriends(this.value)" placeholder="বন্ধুদের খুঁজুন..." class="w-full bg-gray-100 rounded-full py-2.5 pl-10 pr-4 text-sm focus:ring-1 focus:ring-green-500 outline-none">
        </div>
    </div>
    <div class="px-4 py-3 border-b bg-gray-50 overflow-x-auto whitespace-nowrap">
        <h4 class="text-xs font-bold text-gray-500 mb-2">Active Friends</h4>
        <div id="quick-chat-friends" class="flex gap-4">
            <p class="text-xs text-gray-400">লোড হচ্ছে...</p>
        </div>
    </div>
    <div class="px-4 py-2 border-b bg-gray-50 flex justify-between items-center cursor-pointer hover:bg-gray-100" onclick="toggleArchivedChats()">
        <span class="text-sm font-bold text-gray-600"><i class="fa-solid fa-box-archive mr-2"></i> আর্কাইভড চ্যাট</span>
        <i class="fa-solid fa-chevron-right text-gray-400 text-xs"></i>
    </div>

    <!-- 🤖 AI Smart Bot Button -->
    <div class="px-4 py-3 border-b bg-blue-50 flex items-center gap-3 cursor-pointer hover:bg-blue-100 transition" onclick="initAndStartBot()">
        <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-sm">
            <i class="fa-solid fa-robot text-lg"></i>
        </div>
        <div class="flex-1">
            <h4 class="font-bold text-blue-800 text-sm">AI অ্যাসিস্ট্যান্ট (Smart Bot)</h4>
            <p id="bot-loading-text" class="text-[10px] text-blue-600 font-medium">যেকোনো প্রশ্ন করুন...</p>
        </div>
    </div>
    
    <div id="chat-list-container" class="flex-1 overflow-y-auto space-y-0 pb-20">
        <p class="text-center text-gray-400 mt-10 text-sm">লোড হচ্ছে...</p>
    </div>
</div>

<!-- Chat Conversation View -->
<div id="chat-conversation-view" class="hidden hidden-custom fixed inset-0 z-[200] bg-white flex flex-col">
    <div class="bg-white p-3 border-b flex items-center gap-3 sticky top-0 z-20 shadow-sm pt-safe">
        <button onclick="closeChat()" class="text-gray-500 w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100"><i class="fa-solid fa-arrow-left text-lg"></i></button>
        <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-700 font-bold border border-green-200 overflow-hidden" id="chat-header-img">U</div>
        <div class="flex-1 cursor-pointer" onclick="openUserProfile(currentChatUser.uid)">
            <h3 class="font-bold text-gray-800 text-base leading-tight" id="chat-header-name">User</h3>
            <p id="chat-typing-status" class="text-[10px] text-green-600 font-bold hidden">Typing...</p>
        </div>
    </div>

    <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-[#f0f2f5] pb-32"></div>

    <div id="reply-preview-box" class="hidden fixed bottom-[60px] left-0 right-0 bg-gray-100 p-2 border-t border-gray-200 flex justify-between items-center z-40 max-w-[480px] mx-auto mb-safe">
        <div class="flex flex-col border-l-4 border-green-500 pl-2">
            <span class="text-xs font-bold text-gray-700" id="reply-preview-name">Replying to...</span>
            <span class="text-xs text-gray-500 truncate max-w-[250px]" id="reply-preview-text">Message</span>
        </div>
        <button onclick="cancelReply()" class="text-gray-500 hover:bg-gray-200 p-1 rounded-full"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div class="bg-white p-2 border-t flex gap-2 items-center fixed bottom-0 w-full pb-safe z-50 max-w-[480px] mx-auto">
        <div id="chat-voice-ui" class="hidden flex-1 flex items-center gap-2 bg-red-50 rounded-full px-4 py-2 border border-red-200">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
            <span id="chat-voice-timer" class="text-sm font-bold text-red-600 flex-1">00:00</span>
            <button onclick="cancelChatVoice()" class="text-gray-500 text-sm mr-2 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
            <button onclick="sendChatVoice()" class="bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center"><i class="fa-solid fa-paper-plane text-xs"></i></button>
        </div>

        <div id="chat-input-ui" class="flex-1 flex gap-2 items-center">
            <input type="file" id="chat-img-input" accept="image/*" class="hidden" onchange="handleChatImageSelect()">
            <i class="fa-solid fa-image text-xl text-blue-500 p-2 cursor-pointer hover:bg-blue-50 rounded-full" onclick="document.getElementById('chat-img-input').click()"></i>
            <i class="fa-solid fa-microphone text-xl text-red-500 p-2 cursor-pointer hover:bg-red-50 rounded-full" onclick="startChatVoiceRecord()"></i>
            
            <input type="text" id="msg-input" oninput="triggerTyping()" onkeydown="handleEnter(event, 'chat')" placeholder="মেসেজ লিখুন..." class="flex-1 bg-gray-100 rounded-full px-4 py-2.5 text-sm border-0 focus:ring-1 focus:ring-green-500">
            <button onclick="sendMsg()" id="btn-chat-send" class="text-green-600 text-xl p-2 hover:bg-green-50 rounded-full w-10 h-10 flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<!-- Chat List Options Modal (Long Press Option Menu) -->
<div id="chat-list-options-modal" class="fixed inset-0 bg-black bg-opacity-50 z-[300] hidden flex items-end justify-center pb-safe">
    <div class="bg-white w-full max-w-[480px] rounded-t-2xl p-4 transform transition-transform translate-y-full" id="chat-list-sheet">
        <div class="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>
        <h3 class="text-center font-bold text-gray-800 mb-4" id="chat-options-name">User</h3>
        <input type="hidden" id="chat-options-uid">
        
        <div class="space-y-2">
            <button id="btn-toggle-read" onclick="toggleReadStatus()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 font-bold text-gray-700">
                <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-600"><i class="fa-solid fa-envelope-open"></i></div>
                <span id="text-toggle-read">মার্ক অ্যাজ রিড</span>
            </button>

            <button onclick="archiveChat()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 font-bold text-gray-700">
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center"><i class="fa-solid fa-box-archive"></i></div>
                আর্কাইভ করুন
            </button>
            <button onclick="deleteChatConversation()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-red-50 font-bold text-red-600">
                <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center"><i class="fa-solid fa-trash"></i></div>
                কনভারসেশন ডিলিট করুন
            </button>
        </div>
        <button onclick="closeChatListOptions()" class="w-full mt-4 bg-gray-200 text-gray-800 font-bold py-3 rounded-xl">বাতিল</button>
    </div>
</div>

<!-- Message Options Modal -->
<div id="msg-options-modal" class="fixed inset-0 bg-black bg-opacity-50 z-[300] hidden flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-2xl p-4 shadow-xl">
        <h3 class="font-bold text-gray-800 border-b pb-2 mb-3">মেসেজ অপশন</h3>
        <input type="hidden" id="msg-options-id">
        <input type="hidden" id="msg-options-text">
        
        <div class="space-y-1">
            <button onclick="replyToMsgFromOptions()" class="w-full text-left p-3 hover:bg-gray-50 font-bold text-gray-700 rounded-lg"><i class="fa-solid fa-reply mr-2 text-gray-400"></i> রিপ্লে করুন</button>
            <button onclick="copyMsgText()" class="w-full text-left p-3 hover:bg-gray-50 font-bold text-gray-700 rounded-lg"><i class="fa-solid fa-copy mr-2 text-gray-400"></i> কপি করুন</button>
            
            <div class="border-t mt-2 pt-2">
                <button id="btn-unsend-msg" onclick="unsendMsg()" class="hidden w-full text-left p-3 hover:bg-red-50 font-bold text-red-600 rounded-lg"><i class="fa-solid fa-rotate-left mr-2"></i> সবার কাছ থেকে মুছুন (Unsend)</button>
                <button onclick="removeMsgForMe()" class="w-full text-left p-3 hover:bg-gray-50 font-bold text-gray-700 rounded-lg"><i class="fa-solid fa-trash mr-2 text-gray-400"></i> আমার এখান থেকে মুছুন</button>
            </div>
        </div>
        <button onclick="closeMsgOptions()" class="w-full mt-3 bg-gray-200 text-gray-800 font-bold py-2.5 rounded-xl">বাতিল</button>
    </div>
</div>
