<!-- মার্কেট পেজ -->
<div id="page-market" class="hidden p-4 bg-gray-100 min-h-screen pb-20">
    <div class="flex items-center justify-between mb-5 sticky top-0 pt-safe z-30 bg-gray-100 py-2 gap-2">
        <div class="flex items-center gap-2 flex-1">
            <button onclick="switchPage('services')" class="text-gray-500 w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-arrow-left text-lg"></i></button>
            <h2 class="text-xl font-bold text-gray-800 border-l-4 border-orange-500 pl-2">উপজেলা মার্কেট</h2>
        </div>
        <div class="flex gap-2">
            <button onclick="openMyProducts()" class="bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-xs font-bold shadow-sm hover:bg-gray-300 transition"><i class="fa-solid fa-box-open"></i> আমার পণ্য</button>
            <button onclick="toggleSellModal(true)" class="bg-orange-500 text-white px-3 py-2 rounded-lg text-xs font-bold shadow-sm hover:bg-orange-600 transition flex items-center gap-1"><i class="fa-solid fa-plus"></i> বিক্রি করুন</button>
        </div>
    </div>
    <div id="market-list" class="grid grid-cols-2 gap-3">
        <p class="col-span-2 text-center text-gray-400 py-10">লোড হচ্ছে...</p>
    </div>
</div>

<!-- পণ্য বিক্রির মডাল -->
<div id="sell-modal" class="fixed inset-0 bg-black bg-opacity-70 z-[100] flex items-center justify-center hidden-custom p-4 backdrop-blur-sm">
    <div class="bg-white w-full max-w-sm rounded-xl p-5 shadow-2xl relative">
        <button onclick="toggleSellModal(false)" class="absolute top-4 right-4 text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
        <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">পণ্য বিক্রি করুন</h3>
        <div class="space-y-3">
            <input type="text" id="sell-title" placeholder="পণ্যের নাম" class="w-full bg-gray-50 border p-2.5 rounded-lg text-sm">
            <input type="number" id="sell-price" placeholder="দাম (টাকা)" class="w-full bg-gray-50 border p-2.5 rounded-lg text-sm">
            <textarea id="sell-desc" placeholder="বিবরণ এবং যোগাযোগ নম্বর..." rows="3" class="w-full bg-gray-50 border p-2.5 rounded-lg text-sm"></textarea>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">পণ্যের ছবি (সর্বোচ্চ ৪টি)</label>
                <input type="file" id="sell-image-file" accept="image/*" multiple onchange="previewSellImages(this)" class="w-full bg-gray-50 border border-gray-200 p-2 rounded-lg text-sm file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:bg-orange-50 file:text-orange-700">
                <div id="sell-image-preview" class="flex gap-2 mt-2 overflow-x-auto pb-2 scrollbar-hide"></div>
            </div>
        </div>
        <button onclick="submitProduct()" id="btn-sell-submit" class="w-full bg-orange-500 text-white font-bold py-3 mt-4 rounded-lg shadow hover:bg-orange-600 transition flex justify-center items-center gap-2">বিজ্ঞাপন দিন</button>
    </div>
</div>

<!-- Product Details Modal -->
<div id="product-details-modal" class="fixed inset-0 bg-black bg-opacity-70 z-[110] flex items-end sm:items-center justify-center hidden-custom p-0 sm:p-4 backdrop-blur-sm transition-transform transform translate-y-full sm:translate-y-0">
    <div class="bg-white w-full max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
        <div class="flex justify-between items-center p-4 border-b sticky top-0 bg-white z-10">
            <h3 class="text-lg font-bold text-gray-800 truncate">পণ্যের বিস্তারিত</h3>
            <button onclick="closeProductDetails()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-red-100 hover:text-red-500 transition"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="overflow-y-auto pb-20 sm:pb-4 relative flex-1" id="product-details-content">
            <!-- Content will be injected here via JS -->
        </div>
    </div>
</div>

<!-- My Products Modal -->
<div id="my-products-modal" class="fixed inset-0 bg-white z-[105] hidden-custom flex flex-col">
    <div class="flex items-center justify-between p-4 border-b bg-white shadow-sm z-10 sticky top-0 pt-safe">
        <div class="flex items-center gap-2">
            <button onclick="closeMyProducts()" class="w-9 h-9 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600"><i class="fa-solid fa-arrow-left text-lg"></i></button>
            <h3 class="font-bold text-gray-800 text-lg border-l-4 border-orange-500 pl-2">আমার পণ্যসমূহ</h3>
        </div>
    </div>
    <div id="my-products-list" class="flex-1 overflow-y-auto p-4 bg-gray-50 space-y-3 pb-20">
        <!-- User's products will be loaded here -->
    </div>
</div>
