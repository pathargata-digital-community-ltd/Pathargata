<div id="page-education" class="hidden p-0 bg-gray-50 min-h-screen pb-20">
    
    <!-- হেডার অংশ -->
    <div class="bg-white p-4 sticky top-0 z-30 shadow-sm flex items-center gap-3 border-b">
        <button onclick="switchPage('services')" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-600 transition">
            <i class="fa-solid fa-arrow-left text-lg"></i>
        </button>
        <div>
            <h2 class="font-bold text-lg text-gray-800 leading-tight">শিক্ষা সেবা পোর্টাল</h2>
            <p class="text-[11px] text-green-600 font-medium">পাথরঘাটা ডিজিটাল তথ্য সেবা</p>
        </div>
    </div>

    <!-- সার্চ বার -->
    <div class="p-4 bg-white border-b">
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
            <input type="text" id="edu-search-input" onkeyup="window.filterEduItems(this.value)" placeholder="প্রতিষ্ঠান বা শিক্ষকের নাম লিখুন..." class="w-full bg-gray-100 py-2.5 pl-11 pr-4 rounded-full text-sm focus:outline-none focus:ring-1 focus:ring-green-500 border border-transparent transition-all">
        </div>
    </div>

    <!-- ক্যাটাগরি ট্যাব বাটনসমূহ -->
    <div class="p-4">
        <div class="grid grid-cols-3 gap-2">
            <button onclick="window.switchEduTab('institutions')" id="tab-btn-inst" class="py-2.5 px-2 rounded-xl text-xs font-bold transition flex flex-col items-center justify-center gap-1.5 bg-green-600 text-white shadow-md">
                <i class="fa-solid fa-school text-lg"></i>
                <span>শিক্ষা প্রতিষ্ঠান</span>
            </button>
            <button onclick="window.switchEduTab('tutors')" id="tab-btn-tutors" class="py-2.5 px-2 rounded-xl text-xs font-bold transition flex flex-col items-center justify-center gap-1.5 bg-white text-gray-600 border border-gray-100 hover:bg-gray-50">
                <i class="fa-solid fa-chalkboard-user text-lg text-blue-500"></i>
                <span>গৃহশিক্ষক</span>
            </button>
            <button onclick="window.switchEduTab('notices')" id="tab-btn-notices" class="py-2.5 px-2 rounded-xl text-xs font-bold transition flex flex-col items-center justify-center gap-1.5 bg-white text-gray-600 border border-gray-100 hover:bg-gray-50">
                <i class="fa-solid fa-bullhorn text-lg text-orange-500"></i>
                <span>নোটিশ ও ভর্তি</span>
            </button>
        </div>
    </div>

    <!-- মূল ডাটা কন্টেন্ট এরিয়া -->
    <div class="px-4 space-y-3" id="edu-content-container">
        
        <!-- ক্যাটাগরি ১: শিক্ষা প্রতিষ্ঠান সমূহ -->
        <div id="edu-sec-institutions" class="space-y-3">
            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">শিক্ষা প্রতিষ্ঠানসমূহ</h4>
            <div id="institutions-list-target" class="space-y-3">
                <p class="text-center text-gray-400 py-6 text-sm">লোড হচ্ছে...</p>
            </div>
        </div>

        <!-- ক্যাটাগরি ২: গৃহশিক্ষক সমূহ -->
        <div id="edu-sec-tutors" class="space-y-3 hidden">
            <div class="flex justify-between items-center mb-2">
                <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider">উপলব্ধ গৃহশিক্ষক</h4>
            </div>
            <div id="tutors-list-target" class="space-y-3">
                <p class="text-center text-gray-400 py-6 text-sm">লোড হচ্ছে...</p>
            </div>
        </div>

        <!-- ক্যাটাগরি ৩: নোটিশ ও ভর্তি -->
        <div id="edu-sec-notices" class="space-y-3 hidden">
            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">সর্বশেষ নোটিশ বোর্ড</h4>
            <div id="notices-list-target" class="space-y-3">
                <p class="text-center text-gray-400 py-6 text-sm">লোড হচ্ছে...</p>
            </div>
        </div>

    </div>
</div>
