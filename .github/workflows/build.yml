name: Build Android APK

on:
  workflow_dispatch: # এর ফলে আপনি চাইলে ম্যানুয়ালিও বিল্ড করতে পারবেন
  push:
    branches:
      - main
      - master # আপনার মেইন ব্রাঞ্চের নাম অনুযায়ী

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Web Directory
        run: |
          # সব HTML/JS/CSS ফাইল একটি www ফোল্ডারে রাখছি
          mkdir www
          rsync -av --exclude='www' --exclude='.git' --exclude='.github' . www/

      - name: Setup Capacitor & Android Project
        run: |
          npm init -y
          # Capacitor ইন্সটল করা হচ্ছে
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          
          # Capacitor ইনিশিয়ালাইজ করা হচ্ছে (নাম ও প্যাকেজ নেম)
          npx cap init "Patharghata Digital" "com.pathargata.digital" --web-dir www
          
          # Android প্ল্যাটফর্ম যুক্ত করা হচ্ছে
          npx cap add android

      - name: Add Permissions to AndroidManifest.xml (Camera & Mic)
        run: |
          # আপনার অ্যাপে ছবি আপলোড ও ভয়েস রেকর্ড আছে, তাই এই পারমিশনগুলো লাগবে
          sed -i '/<uses-permission android:name="android.permission.INTERNET" \/>/a \    <uses-permission android:name="android.permission.CAMERA" \/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO" \/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Patharghata-Digital-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
