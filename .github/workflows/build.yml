name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Web Directory
        run: |
          mkdir www
          rsync -av --exclude='www' --exclude='.git' --exclude='.github' . www/

      - name: Setup Capacitor & Plugins
        run: |
          npm init -y
          # এখানে Capacitor এর মূল ফাইলের সাথে App এবং Keyboard প্লাগিন যুক্ত করা হয়েছে
          npm install @capacitor/core@5 @capacitor/android@5 @capacitor/app@5 @capacitor/keyboard@5
          npm install -D @capacitor/cli@5
          npx cap init "Patharghata Digital" "com.pathargata.digital" --web-dir www
          npx cap add android

      - name: Configure Capacitor
        run: |
          # কীবোর্ড ওপেন হলে যেন অ্যাপের ডিজাইন ভেঙে না যায় তার ফিক্স
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.pathargata.digital",
            "appName": "Patharghata Digital",
            "webDir": "www",
            "bundledWebRuntime": false,
            "plugins": {
              "Keyboard": {
                "resize": "body",
                "style": "dark",
                "resizeOnFullScreen": true
              }
            }
          }
          EOF

      - name: Add Permissions
        run: |
          sed -i '/<uses-permission android:name="android.permission.INTERNET" \/>/a \    <uses-permission android:name="android.permission.CAMERA" \/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO" \/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" \/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' android/app/src/main/AndroidManifest.xml

      - name: Fix Kotlin Dependency Conflict
        run: |
          cat <<EOF >> android/build.gradle
          
          allprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                      def requested = details.requested
                      if (requested.group == 'org.jetbrains.kotlin' && requested.name.startsWith('kotlin-stdlib')) {
                          details.useVersion '1.8.22'
                      }
                  }
              }
          }
          EOF

      - name: Force Update Gradle Version
        run: |
          cd android
          ./gradlew wrapper --gradle-version 8.7 --distribution-type all

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Patharghata-Digital-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
