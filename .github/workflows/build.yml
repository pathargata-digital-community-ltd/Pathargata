name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # এখানে 17 থেকে 21 করা হয়েছে

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Web Directory
        run: |
          mkdir www
          rsync -av --exclude='www' --exclude='.git' --exclude='.github' . www/

      - name: Setup Capacitor & Android Project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          npx cap init "Patharghata Digital" "com.pathargata.digital" --web-dir www
          npx cap add android

      - name: Add Permissions to AndroidManifest.xml
        run: |
          sed -i '/<uses-permission android:name="android.permission.INTERNET" \/>/a \    <uses-permission android:name="android.permission.CAMERA" \/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO" \/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Patharghata-Digital-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
