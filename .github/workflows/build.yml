name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Web Directory
        run: |
          mkdir www
          rsync -av --exclude='www' --exclude='.git' --exclude='.github' --exclude='assets' . www/

      - name: Setup Capacitor & Plugins
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/android@5 @capacitor/app@5 @capacitor/keyboard@5 @capacitor/camera@5 @capacitor/filesystem@5 @capacitor/splash-screen@5
          npm install -D @capacitor/cli@5 @capacitor/assets@3
          npx cap init "Patharghata Digital" "com.pathargata.digital" --web-dir www
          npx cap add android

      - name: Generate App Icons and Splash Screen
        run: |
          npx @capacitor/assets generate

      - name: Configure Capacitor
        run: |
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.pathargata.digital",
            "appName": "Patharghata Digital",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "url": "https://pathargata-digital-community-ltd.github.io/Pathargata/",
              "cleartext": true
            },
            "plugins": {
              "Keyboard": {
                "resize": "body",
                "style": "dark",
                "resizeOnFullScreen": true
              },
              "SplashScreen": {
                "launchShowDuration": 1000,
                "launchAutoHide": true,
                "backgroundColor": "#16a34a",
                "androidSplashResourceName": "splash",
                "showSpinner": false
              }
            }
          }
          EOF

      - name: Sync Capacitor Files
        run: npx cap sync android

      - name: Add Essential Permissions
        run: |
          sed -i '/<uses-permission android:name="android.permission.INTERNET" \/>/a \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>\n    <uses-permission android:name="android.permission.CAMERA" \/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO" \/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" \/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" \/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" \/>\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" \/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VISUAL_USER_SELECTED" \/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" \/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" \/>\n    <uses-permission android:name="android.permission.VIBRATE" \/>' android/app/src/main/AndroidManifest.xml
          
      - name: Fix Kotlin Dependency Conflict
        run: |
          cat <<EOF >> android/build.gradle
          
          allprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                      def requested = details.requested
                      if (requested.group == 'org.jetbrains.kotlin' && requested.name.startsWith('kotlin-stdlib')) {
                          details.useVersion '1.8.22'
                      }
                  }
              }
          }
          EOF

      - name: Force Update Gradle Version
        run: |
          cd android
          ./gradlew wrapper --gradle-version 8.7 --distribution-type all

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Patharghata-Digital-App
          path: android/app/build/outputs/apk/debug/app-debug.apk