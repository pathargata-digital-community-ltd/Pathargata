<!-- পরিবহন প্রধান পেজ -->
<div id="page-transport" class="hidden p-4 bg-gray-50 min-h-screen pb-20">
    <button onclick="switchPage('services')" class="mb-4 text-gray-500 font-bold text-sm hover:text-gray-700 transition"><i class="fa-solid fa-arrow-left"></i> সকল সেবা</button>
    <h2 class="text-xl font-bold mb-5 border-l-4 border-teal-500 pl-3 text-gray-700">পরিবহন সেবা</h2>

    <!-- ব্যানার স্লাইডার -->
    <div id="transport-banner-container" class="w-full h-40 bg-gray-200 rounded-xl mb-6 shadow-sm overflow-x-auto flex snap-x snap-mandatory hide-scrollbar relative">
        <p class="text-gray-400 text-sm m-auto">ব্যানার লোড হচ্ছে...</p>
    </div>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <h3 class="font-bold text-gray-600 mb-3 text-sm">ক্যাটাগরি নির্বাচন করুন</h3>
    <!-- রেন্ট-এ-কার এবং বাস অপশন -->
    <div class="grid grid-cols-2 gap-4">
        <!-- এখানে loadRentACar() মুছে দেওয়া হয়েছে -->
        <div onclick="switchPage('rent-a-car');" class="bg-white p-5 rounded-2xl shadow-sm flex flex-col items-center justify-center cursor-pointer hover:bg-teal-50 transition border border-gray-100 transform active:scale-95">
            <div class="w-14 h-14 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center text-2xl mb-3"><i class="fa-solid fa-car"></i></div>
            <h4 class="font-bold text-gray-800 text-base">রেন্ট-এ-কার</h4>
            <p class="text-[10px] text-gray-500 text-center mt-1">প্রাইভেট কার ও মাইক্রোবাস</p>
        </div>

        <!-- এখানে loadBusServices() মুছে দেওয়া হয়েছে -->
        <div onclick="switchPage('bus');" class="bg-white p-5 rounded-2xl shadow-sm flex flex-col items-center justify-center cursor-pointer hover:bg-green-50 transition border border-gray-100 transform active:scale-95">
            <div class="w-14 h-14 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-2xl mb-3"><i class="fa-solid fa-bus"></i></div>
            <h4 class="font-bold text-gray-800 text-base">বাস সার্ভিস</h4>
            <p class="text-[10px] text-gray-500 text-center mt-1">লোকাল ও দূরপাল্লার বাস</p>
        </div>
    </div>
</div>

<!-- রেন্ট-এ-কার পেজ -->
<div id="page-rent-a-car" class="hidden p-4 bg-gray-50 min-h-screen pb-20">
    <button onclick="switchPage('transport')" class="mb-4 text-gray-500 font-bold text-sm"><i class="fa-solid fa-arrow-left"></i> ফিরে যান</button>
    <div class="flex justify-between items-center mb-5">
        <h2 class="text-xl font-bold border-l-4 border-teal-500 pl-3 text-gray-700">রেন্ট-এ-কার</h2>
    </div>
    <div class="bg-teal-50 p-3 rounded-lg border border-teal-100 mb-4">
        <p class="text-xs text-teal-800 font-medium"><i class="fa-solid fa-location-dot mr-1"></i> শুধুমাত্র <b><span id="user-village-name">আপনার গ্রামের</span></b> গাড়িগুলো এখানে দেখানো হচ্ছে।</p>
    </div>
    <div id="rent-a-car-list" class="space-y-3">
        <p class="text-center text-gray-400 py-10">গাড়ি লোড হচ্ছে...</p>
    </div>
</div>

<!-- বাস সার্ভিস পেজ -->
<div id="page-bus" class="hidden p-4 bg-gray-50 min-h-screen pb-20">
    <button onclick="switchPage('transport')" class="mb-4 text-gray-500 font-bold text-sm"><i class="fa-solid fa-arrow-left"></i> ফিরে যান</button>
    <h2 class="text-xl font-bold mb-5 border-l-4 border-green-500 pl-3 text-gray-700">বাস সার্ভিস</h2>
    <div id="bus-service-list" class="space-y-3">
        <p class="text-center text-gray-400 py-10">বাসের তথ্য লোড হচ্ছে...</p>
    </div>
</div>
