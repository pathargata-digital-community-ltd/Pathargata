<div class="px-4 pt-4 pb-20">
    
    <!-- ==========================
         Live Video Player Section 
    =========================== -->
    <div class="mb-5 bg-black rounded-xl overflow-hidden shadow-xl border border-gray-800 relative w-full h-[210px]">
        <iframe 
            src="https://famelack.com/tv/bd/J7BmdiABqVkDMa" 
            class="absolute left-0 w-full border-0" 
            style="top: -135px; height: 450px;"
            allow="fullscreen; autoplay; encrypted-media; picture-in-picture"
            allowfullscreen="true">
        </iframe>
    </div>

    <!-- ==========================
         Banner Section
    =========================== -->
    <div class="bg-gradient-to-r from-green-700 to-teal-800 rounded-2xl p-4 text-center text-white mb-6 shadow-md relative overflow-hidden">
        <i class="fa-solid fa-trophy absolute -right-4 -bottom-4 text-6xl opacity-20 transform -rotate-12"></i>
        <h2 class="text-lg font-bold mb-1">ফিফা লাইভ আপডেট</h2>
        <p class="text-[11px] text-green-100">লাইভ স্কোর, ফলাফল এবং সময়সূচি</p>
    </div>

    <!-- API Status -->
    <div id="fifa-api-status" class="text-center text-xs text-gray-500 mb-4"></div>
    
    <!-- ==========================
         Live Matches Section (সবসময় উপরে থাকবে)
    =========================== -->
    <div class="mb-6">
        <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-red-600 animate-pulse"></span> লাইভ চলছে
        </h3>
        
        <div id="fifa-live-container" class="space-y-3">
            <div class="text-center py-6 bg-white rounded-xl border border-gray-100 shadow-sm">
                <i class="fa-solid fa-circle-notch fa-spin text-2xl text-red-600 mb-2"></i>
                <p class="text-gray-500 font-bold text-xs">লাইভ স্কোর লোড হচ্ছে...</p>
            </div>
        </div>
    </div>

    <!-- ==========================
         Tab Buttons (আসন্ন ও ফলাফল)
    =========================== -->
    <div class="flex justify-center bg-gray-200 rounded-lg p-1 mb-4">
        <!-- Upcoming Tab Button -->
        <button onclick="toggleFifaTab('upcoming')" id="tab-upcoming" class="w-1/2 py-2 text-xs font-bold rounded-md bg-white text-blue-600 shadow-sm transition-all flex justify-center items-center gap-2">
            <i class="fa-regular fa-calendar-days"></i> আসন্ন ম্যাচ
        </button>
        <!-- Result Tab Button -->
        <button onclick="toggleFifaTab('finished')" id="tab-finished" class="w-1/2 py-2 text-xs font-bold rounded-md text-gray-500 hover:text-gray-700 transition-all flex justify-center items-center gap-2">
            <i class="fa-solid fa-square-check"></i> ফলাফল
        </button>
    </div>

    <!-- ==========================
         Tab Content Sections
    =========================== -->
    <div>
        <!-- Upcoming Matches (ডিফল্টভাবে দেখা যাবে) -->
        <div id="fifa-upcoming-container" class="space-y-3 block">
            <div class="text-center py-6 bg-white rounded-xl border border-gray-100 shadow-sm">
                <i class="fa-solid fa-circle-notch fa-spin text-2xl text-blue-600 mb-2"></i>
                <p class="text-gray-500 font-bold text-xs">ম্যাচের সময়সূচি লোড হচ্ছে...</p>
            </div>
        </div>

        <!-- Finished Matches / Results (ডিফল্টভাবে লুকানো থাকবে) -->
        <div id="fifa-finished-container" class="space-y-3 hidden">
            <div class="text-center py-6 bg-white rounded-xl border border-gray-100 shadow-sm">
                <i class="fa-solid fa-circle-notch fa-spin text-2xl text-green-600 mb-2"></i>
                <p class="text-gray-500 font-bold text-xs">ফলাফল লোড হচ্ছে...</p>
            </div>
        </div>
    </div>

</div>
