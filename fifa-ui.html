<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA Live Updates & Results</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div class="max-w-md mx-auto px-4 pt-4 pb-20">
        
        <!-- ==========================
             Live Video Player Section
        =========================== -->
        <div class="mb-5 bg-black rounded-xl overflow-hidden shadow-xl border border-gray-800 relative w-full h-[210px]">
            <iframe 
                src="https://famelack.com/tv/bd/J7BmdiABqVkDMa" 
                class="absolute left-0 w-full border-0" 
                style="top: -135px; height: 450px;"
                allow="fullscreen; autoplay; encrypted-media; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>

        <!-- ==========================
             Banner Section
        =========================== -->
        <div class="bg-gradient-to-r from-green-700 to-teal-800 rounded-2xl p-4 text-center text-white mb-6 shadow-md relative overflow-hidden">
            <i class="fa-solid fa-trophy absolute -right-4 -bottom-4 text-6xl opacity-20 transform -rotate-12"></i>
            <h2 class="text-lg font-bold mb-1">ফিফা লাইভ আপডেট</h2>
            <p class="text-[11px] text-green-100">স্কোর, সময়সূচি এবং ফলাফল</p>
        </div>

        <!-- API Status -->
        <div id="fifa-api-status" class="text-center text-xs text-gray-500 mb-4"></div>
        
        <!-- ==========================
             Live Matches Section 
        =========================== -->
        <div class="mb-6">
            <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-red-600 animate-pulse"></span> লাইভ চলছে
            </h3>
            <div id="fifa-live-container" class="space-y-3">
                <div class="text-center py-6 bg-white rounded-xl border border-gray-100 shadow-sm">
                    <i class="fa-solid fa-circle-notch fa-spin text-2xl text-green-600 mb-2"></i>
                    <p class="text-gray-500 font-bold text-xs mt-2">লাইভ স্কোর লোড হচ্ছে...</p>
                </div>
            </div>
        </div>

        <!-- ==========================
             Results (Finished Matches) Section 
        =========================== -->
        <div class="mb-6">
            <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                <i class="fa-solid fa-square-check text-green-600"></i> ফলাফল (সাম্প্রতিক)
            </h3>
            <div id="fifa-results-container" class="space-y-3">
                <div class="text-center py-6 bg-white rounded-xl border border-gray-100 shadow-sm">
                    <i class="fa-solid fa-circle-notch fa-spin text-2xl text-green-600 mb-2"></i>
                    <p class="text-gray-500 font-bold text-xs mt-2">ফলাফল লোড হচ্ছে...</p>
                </div>
            </div>
        </div>

        <!-- ==========================
             Upcoming Matches Section 
        =========================== -->
        <div>
            <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                <i class="fa-regular fa-calendar-days text-blue-600"></i> আসন্ন ম্যাচগুলো
            </h3>
            <div id="fifa-upcoming-container" class="space-y-3">
                <div class="text-center py-6 bg-white rounded-xl border border-gray-100 shadow-sm">
                    <i class="fa-solid fa-circle-notch fa-spin text-2xl text-blue-600 mb-2"></i>
                    <p class="text-gray-500 font-bold text-xs mt-2">ম্যাচের সময়সূচি লোড হচ্ছে...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- External JavaScript Link -->
    <script src="script.js"></script>
</body>
</html>
