<!-- Full Screen Comment Modal -->
<div id="comment-full-modal" class="fixed inset-0 bg-white z-[180] flex flex-col hidden-custom">
    <div class="flex items-center justify-between p-4 border-b bg-white shadow-sm z-10 sticky top-0 pt-safe">
        <div class="flex items-center gap-2">
            <button onclick="closeFullCommentModal()" class="w-9 h-9 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600"><i class="fa-solid fa-arrow-left text-lg"></i></button>
            <h3 class="font-bold text-gray-800 text-lg">কমেন্টসমূহ</h3>
        </div>
        <span id="full-comment-count" class="text-sm bg-gray-100 px-3 py-1 rounded-full font-bold text-gray-600">0</span>
    </div>
    
    <div id="full-comments-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50 pb-20">
        <!-- কমেন্টগুলো এখানে লোড হবে -->
    </div>

    <!-- রিপ্লাই ইন্ডিকেটর -->
    <div id="replying-to-indicator" class="hidden flex items-center justify-between bg-gray-200 px-4 py-2 text-sm border-t">
        <span class="text-gray-700">Replying to <b id="reply-to-name" class="text-gray-900">Name</b></span>
        <button onclick="cancelReply()" class="text-gray-500 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div class="p-3 border-t bg-white flex gap-2 items-center sticky bottom-0 w-full pb-safe">
        <div id="my-comment-avatar-full" class="w-9 h-9 rounded-full bg-gray-200 overflow-hidden flex items-center justify-center border border-gray-100 shrink-0"><i class="fa-solid fa-user text-gray-400"></i></div>
        <input type="text" id="full-comment-input" onkeydown="handleEnter(event, 'full-comment')" placeholder="আপনার মতামত লিখুন..." class="flex-1 bg-gray-100 rounded-full px-5 py-3 text-sm border-0 focus:ring-1 focus:ring-green-500">
        <button onclick="submitFullComment()" class="text-green-600 text-xl p-2 hover:bg-gray-100 rounded-full w-10 h-10 flex items-center justify-center shadow-sm border border-gray-100"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>
